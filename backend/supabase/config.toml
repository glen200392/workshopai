# ═══════════════════════════════════════════════════════════════
# Supabase CLI 設定檔
# 初始化指令：supabase init（會自動生成此檔案）
# 連結專案：supabase link --project-ref 你的專案id
# ═══════════════════════════════════════════════════════════════

[api]
enabled = true
port = 54321
schemas = ["public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[studio]
enabled = true
port = 54323

[inbucket]
enabled = true
port = 54324

[storage]
enabled = true

[auth]
enabled = true
site_url = "http://localhost:3000"
additional_redirect_urls = ["https://localhost:3000"]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
enable_signup = true

[edge_runtime]
enabled = true
policy = "per_worker"

# ── Functions ──
[functions.ai-proxy]
verify_jwt = false   # 學員端匿名呼叫，不驗 JWT
# import_map = "./functions/ai-proxy/deno.json"
